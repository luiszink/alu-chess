gatling {
  core {
    outputDirectoryBaseName = "alu-chess-gatling"
    runDescription = "ALU-Chess Load Test"
    encoding = "utf-8"
  }
  http {
    connectTimeout = 10000
    readTimeout = 15000
    pooledConnectionIdleTimeout = 60000
    enableGA = false
  }
  data {
    writers = [console, file]
    console {
      light = false
    }
    file {
      bufferSize = 8192
    }
  }
}
