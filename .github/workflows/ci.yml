name: CI

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test (Scala ${{ matrix.scala }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        scala: [ "3.6.4" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JVM and sbt
        uses: coursier/setup-action@v1
        with:
          jvm: temurin:17
          apps: sbt

      - name: Compile
        run: sbt compile

      - name: Test
        run: sbt test

      - name: Coverage Report
        run: sbt clean coverage test coverageReport

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/scala-3.6.4/scoverage-report/
          retention-days: 14
