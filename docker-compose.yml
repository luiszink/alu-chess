services:

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       chess
      POSTGRES_USER:     chess
      POSTGRES_PASSWORD: chess
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d chess"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["postgres", "all"]

  # ── MongoDB ────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["mongo", "all"]

  # ── Stockfish Engine (Python/FastAPI) ──────────────────────────
  stockfish:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Model Service ──────────────────────────────────────────────
  model:
    build:
      context: .
      dockerfile: Dockerfile.model
    ports:
      - "8082:8082"
    environment:
      PORT:            "8082"
      ENGINE_BASE_URL: http://stockfish:8000
    depends_on:
      stockfish:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Controller Service ─────────────────────────────────────────
  # DB_TYPE wird aus .env gelesen (postgres | mongo | memory)
  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    ports:
      - "8081:8081"
    environment:
      PORT:        "8081"
      DB_TYPE:     ${DB_TYPE:-memory}
      # PostgreSQL
      DB_URL:      ${DB_URL:-jdbc:postgresql://postgres:5432/chess}
      DB_USER:     ${DB_USER:-chess}
      DB_PASSWORD: ${DB_PASSWORD:-chess}
      # MongoDB
      MONGO_URI:   ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB:    ${MONGO_DB:-chess}
    depends_on:
      model:
        condition: service_healthy

  # ── PlayerService ──────────────────────────────────────────────
  playerservice:
    build:
      context: .
      dockerfile: Dockerfile.playerservice
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"

volumes:
  postgres_data:
  mongo_data:
