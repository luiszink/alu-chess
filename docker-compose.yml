services:

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       chess
      POSTGRES_USER:     chess
      POSTGRES_PASSWORD: chess
    ports:
      - "127.0.0.1:5432:5432" # Für DB-Tools während der Entwicklung lokal erreichbar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d chess"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["postgres", "all"]

  # ── MongoDB ────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    ports:
      - "127.0.0.1:27017:27017" # Für DB-Tools während der Entwicklung lokal erreichbar
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["mongo", "all"]

  # ── Stockfish Engine (Python/FastAPI) ──────────────────────────
  stockfish:
    build:
      context: .
      dockerfile: Dockerfile.stockfish
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Model Service ──────────────────────────────────────────────
  model:
    build:
      context: .
      dockerfile: Dockerfile.model
    expose:
      - "8082"
    environment:
      PORT:            "8082"
      ENGINE_BASE_URL: http://stockfish:8000
    depends_on:
      stockfish:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Controller Service ─────────────────────────────────────────
  # DB_TYPE wird aus .env gelesen (postgres | mongo | memory)
  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    expose:
      - "8081"
    environment:
      PORT:               "8081"
      PLAYER_SERVICE_URL: http://playerservice:8083
      DB_TYPE:            ${DB_TYPE}
      # PostgreSQL
      DB_URL:      ${DB_URL}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # MongoDB
      MONGO_URI:   ${MONGO_URI}
      MONGO_DB:    ${MONGO_DB}
    depends_on:
      model:
        condition: service_healthy
      playerservice:
        condition: service_started
      postgres:
        condition: service_healthy
        required: false
      mongo:
        condition: service_healthy
        required: false

  # ── PlayerService ──────────────────────────────────────────────
  playerservice:
    build:
      context: .
      dockerfile: Dockerfile.playerservice
    expose:
      - "8083"
    environment:
      PORT: "8083"

  # ── Frontend (React + Vite, served via nginx) ──────────────────
  # FRONTEND_CONTEXT wird aus .env gelesen (Pfad zum alu-chess-web Repo)
  frontend:
    build:
      context: ${FRONTEND_CONTEXT}
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - controller
      - model

volumes:
  postgres_data:
  mongo_data:
